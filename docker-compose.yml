version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: smartquiz_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: smartquiz_server
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/smartquiz
      - JWT_SECRET=dev-secret-key-change-in-prod
      - REFRESH_TOKEN_DAYS=7
      - CLIENT_ORIGINS=http://localhost:3000
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: smartquiz_client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongodb_data:
